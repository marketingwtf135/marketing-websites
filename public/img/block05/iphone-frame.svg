<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 761" fill="none">
  <!-- Phone body outer -->
  <rect x="0.5" y="0.5" width="349" height="760" rx="52" fill="#1a1a1a" stroke="#333333" stroke-width="1"/>

  <!-- Screen area / glass -->
  <rect x="6" y="6" width="338" height="749" rx="47" fill="#060606"/>

  <!-- Dynamic Island -->
  <rect x="125" y="18" width="100" height="30" rx="15" fill="#000000"/>
  <!-- Front camera inside island -->
  <circle cx="195" cy="33" r="6" fill="#111111"/>
  <circle cx="195" cy="33" r="3" fill="#1a1a1a"/>

  <!-- Side button — right volume top -->
  <rect x="349" y="130" width="4" height="44" rx="2" fill="#2a2a2a"/>
  <!-- Side button — right volume bottom -->
  <rect x="349" y="186" width="4" height="44" rx="2" fill="#2a2a2a"/>
  <!-- Side button — left (action) -->
  <rect x="-3" y="120" width="4" height="36" rx="2" fill="#2a2a2a"/>
  <!-- Side button — left power/lock -->
  <rect x="349" y="260" width="4" height="72" rx="2" fill="#2a2a2a"/>

  <!-- Screen glare — subtle top-left highlight -->
  <rect x="6" y="6" width="338" height="749" rx="47"
    fill="url(#screenGlare)" opacity="0.04"/>

  <defs>
    <linearGradient id="screenGlare" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
